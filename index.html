<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/vite.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Primary Meta Tags -->
    <title>AniLog - Track & Discover Anime</title>
    <meta name="title" content="AniLog - Track & Discover Anime" />
    <meta name="description" content="A beautiful anime tracking application with social features, stats, and discovery. Track your progress, share with friends, and find your next favorite show." />

    <!-- Open Graph / Facebook / Discord -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://anilog.app/" />
    <meta property="og:title" content="AniLog - Track & Discover Anime" />
    <meta property="og:description" content="A beautiful anime tracking application with social features, stats, and discovery. Track your progress, share with friends, and find your next favorite show." />
    <meta property="og:image" content="https://kitsu.io/images/default_cover-22e5f56b17aeced6dc7f69c8d422a1ab.jpg" />

    <!-- Twitter -->
    <meta property="twitter:card" content="summary_large_image" />
    <meta property="twitter:url" content="https://anilog.app/" />
    <meta property="twitter:title" content="AniLog - Track & Discover Anime" />
    <meta property="twitter:description" content="A beautiful anime tracking application with social features, stats, and discovery. Track your progress, share with friends, and find your next favorite show." />
    <meta property="twitter:image" content="https://kitsu.io/images/default_cover-22e5f56b17aeced6dc7f69c8d422a1ab.jpg" />

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700;900&display=swap" rel="stylesheet">
    <style>
      body {
        font-family: 'Inter', sans-serif;
        background-color: #050505;
        color: #ffffff;
        overflow-x: hidden;
      }
      
      /* Cinematic Noise Texture */
      .bg-noise {
        position: fixed;
        top: 0;
        left: 0;
        width: 100vw;
        height: 100vh;
        pointer-events: none;
        z-index: 50;
        opacity: 0.035;
        background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.65' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
      }

      /* Hide scrollbar for Chrome, Safari and Opera */
      .no-scrollbar::-webkit-scrollbar {
          display: none;
      }
      /* Hide scrollbar for IE, Edge and Firefox */
      .no-scrollbar {
          -ms-overflow-style: none;  /* IE and Edge */
          scrollbar-width: none;  /* Firefox */
      }
      .safe-pb {
          padding-bottom: env(safe-area-inset-bottom, 20px);
      }
      
      /* Global Smooth Scroll */
      html {
        scroll-behavior: smooth;
      }
    </style>
</head>
  <body>
    <div id="root"></div>
    <div class="bg-noise"></div>
    <script type="module" src="/index.tsx"></script>
  </body>
</html>
